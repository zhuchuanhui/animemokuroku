<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动漫目录</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c9a84c; --gold-light: #e2c97e; --bg: #080808; --surface: #111; --border: rgba(255,255,255,.07); }
    body { font-family: "Noto Sans JP","PingFang SC","Hiragino Sans GB",sans-serif; background: var(--bg); color: #d4d4d4; overflow-x: hidden; }
    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 999; display: flex; align-items: center; justify-content: space-between; padding: 22px 72px; backdrop-filter: blur(0px); transition: backdrop-filter .4s, background .4s; }
    nav.scrolled { backdrop-filter: blur(20px); background: rgba(8,8,8,.7); border-bottom: 1px solid var(--border); }
    .nav-logo { color: #fff; font-family: "Cormorant Garamond",serif; font-weight: 600; font-size: 1.2rem; letter-spacing: 6px; text-transform: uppercase; }
    .nav-right { display: flex; align-items: center; gap: 36px; }
    .nav-links { display: flex; gap: 36px; }
    .nav-links a { color: rgba(255,255,255,.45); text-decoration: none; font-size: .78rem; letter-spacing: 2px; text-transform: uppercase; transition: color .3s; }
    .nav-links a:hover { color: var(--gold-light); }
    .lang-switcher { display: flex; gap: 2px; border: 1px solid rgba(255,255,255,.12); border-radius: 2px; overflow: hidden; }
    .lang-btn { background: transparent; border: none; color: rgba(255,255,255,.35); padding: 5px 12px; font-size: .7rem; letter-spacing: 1px; cursor: pointer; transition: all .2s; font-family: inherit; }
    .lang-btn.active, .lang-btn:hover { background: var(--gold); color: #000; }
    /* HERO */
    .hero { position: relative; height: 100svh; min-height: 560px; overflow: hidden; background: #000; }
    .slides { display: flex; height: 100%; transition: transform .9s cubic-bezier(.77,0,.18,1); }
    .slide { min-width: 100%; height: 100%; position: relative; flex-shrink: 0; }
    .slide img.slide-bg { width: 100%; height: 100%; object-fit: cover; opacity: .4; filter: saturate(.8); }
    .slide::after { content: ""; position: absolute; inset: 0; background: linear-gradient(105deg, rgba(8,8,8,.85) 35%, transparent 70%), linear-gradient(to top, var(--bg) 8%, transparent 50%); }
    .slide-content { position: absolute; bottom: 100px; left: 72px; z-index: 2; max-width: 580px; }
    .slide-tag { font-size: .65rem; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; font-weight: 400; }
    .slide-title { font-family: "Cormorant Garamond",serif; font-size: clamp(2.8rem,5.5vw,5rem); font-weight: 600; color: #fff; line-height: 1.05; letter-spacing: .02em; }
    .slide-desc { margin-top: 18px; font-size: .85rem; color: rgba(255,255,255,.45); line-height: 2; font-weight: 300; max-width: 440px; }
    .slide-btns { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { padding: 11px 28px; font-size: .75rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; display: inline-block; transition: all .3s; letter-spacing: 2px; text-transform: uppercase; font-family: inherit; }
    .btn-primary { background: var(--gold); color: #000; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-outline { background: transparent; color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.2); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .hero-dots { position: absolute; bottom: 36px; left: 72px; z-index: 3; display: flex; gap: 10px; align-items: center; }
    .dot { width: 20px; height: 1px; background: rgba(255,255,255,.2); cursor: pointer; transition: all .4s; }
    .dot.active { background: var(--gold); width: 40px; }
    .hero-arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; background: transparent; border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.5); width: 48px; height: 48px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all .3s; }
    .hero-arrow:hover { border-color: var(--gold); color: var(--gold); }
    .hero-arrow.prev { left: 24px; }
    .hero-arrow.next { right: 24px; }
    /* SECTION */
    .section { max-width: 1320px; margin: 0 auto; padding: 100px 72px; }
    .section-eyebrow { font-size: .62rem; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; font-weight: 400; }
    .section-title { font-family: "Cormorant Garamond",serif; font-size: clamp(1.8rem,2.5vw,2.8rem); font-weight: 600; margin-bottom: 40px; color: #fff; letter-spacing: .02em; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 40px; gap: 0; }
    .tab { padding: 12px 28px; font-size: .72rem; font-weight: 500; cursor: pointer; color: rgba(255,255,255,.3); border-bottom: 1px solid transparent; margin-bottom: -1px; transition: all .3s; letter-spacing: 2px; text-transform: uppercase; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab:hover { color: rgba(255,255,255,.7); }
    /* GRID */
    .anime-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(170px,1fr)); gap: 20px; }
    .anime-card { overflow: hidden; cursor: pointer; background: var(--surface); transition: transform .4s cubic-bezier(.25,.46,.45,.94); position: relative; }
    .anime-card::before { content: ""; position: absolute; inset: 0; border: 1px solid transparent; transition: border-color .3s; z-index: 1; pointer-events: none; }
    .anime-card:hover { transform: translateY(-6px); }
    .anime-card:hover::before { border-color: var(--gold); }
    .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; filter: saturate(.85); transition: filter .4s, transform .4s; }
    .anime-card:hover img { filter: saturate(1); transform: scale(1.03); }
    .img-credit { position: absolute; bottom: 58px; right: 4px; font-size: .5rem; color: rgba(255,255,255,.2); background: rgba(0,0,0,.5); padding: 1px 4px; z-index: 2; }
    .anime-card-info { padding: 12px 14px; border-top: 1px solid var(--border); }
    .anime-card-info h3 { font-size: .82rem; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(255,255,255,.8); letter-spacing: .5px; }
    .anime-card-info .score { margin-top: 4px; font-size: .7rem; color: var(--gold); letter-spacing: 1px; }
    .anime-card-info .year { font-size: .68rem; color: rgba(255,255,255,.2); margin-top: 2px; }
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .4s; backdrop-filter: blur(8px); }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: #0f0f0f; border: 1px solid var(--border); max-width: 780px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; transform: translateY(24px) scale(.98); transition: transform .4s cubic-bezier(.25,.46,.45,.94); }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-hero { position: relative; height: 280px; overflow: hidden; }
    .modal-hero img.modal-bg { width: 100%; height: 100%; object-fit: cover; opacity: .35; filter: saturate(.7); }
    .modal-hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top,#0f0f0f 15%,transparent 60%); }
    .modal-hero-content { position: absolute; bottom: 24px; left: 28px; right: 28px; z-index: 1; display: flex; gap: 20px; align-items: flex-end; }
    .modal-poster { width: 88px; height: 126px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); filter: saturate(.9); }
    .modal-hero-text h2 { font-family: "Cormorant Garamond",serif; font-size: 1.7rem; font-weight: 600; color: #fff; letter-spacing: .03em; }
    .modal-subtitle { font-size: .72rem; color: rgba(255,255,255,.3); margin-top: 4px; letter-spacing: 1px; }
    .modal-meta { margin-top: 8px; font-size: .72rem; color: rgba(255,255,255,.35); display: flex; gap: 14px; letter-spacing: 1px; }
    .modal-body { padding: 24px 28px 32px; }
    .modal-score { font-size: .78rem; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; }
    .modal-synopsis { font-size: .84rem; color: rgba(255,255,255,.5); line-height: 2; font-weight: 300; }
    .modal-section-title { font-size: .6rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,.2); margin: 24px 0 12px; }
    .modal-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-link { padding: 8px 18px; font-size: .75rem; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: opacity .2s; letter-spacing: 1px; }
    .modal-link:hover { opacity: .75; }
    .link-mal { background: #1a2a5e; color: rgba(255,255,255,.8); border: 1px solid #2e51a2; }
    .link-tencent { background: #3a1a00; color: rgba(255,255,255,.8); border: 1px solid #ff6600; }
    .link-wetv { background: #3a2800; color: rgba(255,255,255,.8); border: 1px solid #f5a623; }
    .link-bili { background: #003a4a; color: rgba(255,255,255,.8); border: 1px solid #00a1d6; }
    .link-bilitv { background: #002a3a; color: rgba(255,255,255,.8); border: 1px solid #0082b8; }
    .link-iqiyi { background: #003a00; color: rgba(255,255,255,.8); border: 1px solid #00be06; }
    .link-funi { background: #1a0030; color: rgba(255,255,255,.8); border: 1px solid #410099; }
    .link-netflix { background: #3a0000; color: rgba(255,255,255,.8); border: 1px solid #e50914; }
    .link-youtube { background: #3a0000; color: rgba(255,255,255,.8); border: 1px solid #ff0000; }
    .link-crunchyroll { background: #3a1a00; color: rgba(255,255,255,.8); border: 1px solid #f47521; }
    .modal-img-credit { font-size: .68rem; color: rgba(255,255,255,.18); margin-top: 20px; line-height: 1.7; border-top: 1px solid var(--border); padding-top: 16px; }
    .modal-trailer { margin-top: 20px; }
    .modal-trailer iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
    .modal-fullimg { margin-top: 16px; }
    .modal-fullimg img { width: 100%; display: block; object-fit: cover; max-height: 320px; }
    .modal-close { position: absolute; top: 16px; right: 16px; z-index: 10; background: rgba(0,0,0,.6); border: 1px solid var(--border); color: rgba(255,255,255,.5); width: 32px; height: 32px; cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .modal-close:hover { border-color: var(--gold); color: var(--gold); }
    /* TIMELINE */
    .dark-section { background: #050505; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .tl { display: grid; grid-template-columns: repeat(5,1fr); border-top: 1px solid var(--border); margin-top: 40px; }
    .tl-item { padding: 28px 20px; border-right: 1px solid var(--border); }
    .tl-item:last-child { border-right: none; }
    .tl-year { font-family: "Cormorant Garamond",serif; font-size: 2.2rem; font-weight: 600; color: var(--gold); line-height: 1; }
    .tl-title { margin-top: 12px; font-size: .78rem; font-weight: 500; color: rgba(255,255,255,.7); letter-spacing: 1px; }
    .tl-desc { margin-top: 8px; font-size: .72rem; color: rgba(255,255,255,.3); line-height: 1.7; font-weight: 300; }
    footer { text-align: center; padding: 36px; font-size: .7rem; color: rgba(255,255,255,.18); border-top: 1px solid var(--border); line-height: 2; letter-spacing: 1px; }
    footer a { color: rgba(255,255,255,.25); text-decoration: none; }
    footer a:hover { color: var(--gold); }
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      .slide-content { left: 24px; bottom: 80px; max-width: calc(100% - 48px); }
      .hero-dots { left: 24px; }
      .section { padding: 60px 24px; }
      .anime-grid { grid-template-columns: repeat(3,1fr); gap: 10px; }
      .tl { grid-template-columns: 1fr 1fr; }
      .tl-item:nth-child(2n) { border-right: none; }
      .modal-poster { display: none; }
    }
  </style>
</head>

  {cn:"火影忍者",ja:"NARUTO",en:"Naruto",year:2002,score:8.02,trailer:"",img:"https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx20-dE6UHbFFg1A5.jpg",tag:{zh:"冒险·热血",ja:"冒険",en:"Adventure"},synopsis:{zh:"体内封印九尾妖狐的少年鸣人，立志成为火影，在无数磨砺中成长为守护村子的英雄。",ja:"九尾を封印された少年・ナルトが火影を目指し、仲間と共に成長する熱血物語。",en:"Naruto, a boy with a demon fox sealed inside him, dreams of becoming Hokage and earns the village's respect."},mal:"https://myanimelist.net/anime/20/Naruto",watch:{crunchyroll:"https://www.crunchyroll.com/series/GY9PJ5KWR/naruto",netflix:"https://www.netflix.com/search?q=naruto",youtube:"https://www.youtube.com/results?search_query=Naruto+anime+eng+sub"}},
  {cn:"海贼王",ja:"ワンピース",en:"One Piece",year:1999,score:8.7,trailer:"-tviZNY6CSw",img:"https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx21-ELSYx3yMPcKM.jpg",tag:{zh:"冒险·热血",ja:"冒険",en:"Adventure"},synopsis:{zh:"少年路飞为成为海贼王，率领草帽海贼团踏上寻找传说宝藏One Piece的伟大航路。",ja:"ルフィが海賊王を目指し、麦わら海賊団と共に伝説の宝を求めて大海原へ。",en:"Luffy and his Straw Hat crew sail the Grand Line in search of the legendary treasure One Piece."},mal:"https://myanimelist.net/anime/21/One_Piece",watch:{crunchyroll:"https://www.crunchyroll.com/series/GRMG8ZQZR/one-piece",netflix:"https://www.netflix.com/search?q=one+piece",youtube:"https://www.youtube.com/results?search_query=One+Piece+anime+eng+sub"}},
];

let lang='zh', curTab='cn', cur=0, timer;
const HERO_IDX = [0,1,2,3,4];

function setLang(l) {
  lang = l;
  document.documentElement.lang = l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim()===(l==='zh'?'中':l==='ja'?'日':'EN')));
  document.querySelectorAll('[data-i18n]').forEach(el => { if(I18N[l][el.dataset.i18n]) el.textContent=I18N[l][el.dataset.i18n]; });
  rebuildHero(); rebuildGrid(); rebuildTimeline();
}

function rebuildTimeline() {
  document.getElementById('timeline').innerHTML = I18N[lang].tl.map(t =>
    `<div class="tl-item"><div class="tl-year">${t.year}</div><div class="tl-title">${t.title}</div><div class="tl-desc">${t.desc}</div></div>`
  ).join('');
}

function rebuildHero() {
  clearInterval(timer);
  const data = curTab==='cn' ? CN_ANIME : JP_ANIME;
  const heroIdx = [0,1,2,3,4];
  const sl = document.getElementById('slides'), dt = document.getElementById('dots');
  sl.style.transition='none'; sl.style.transform='translateX(0)'; cur=0;
  sl.innerHTML = heroIdx.map(idx => {
    const a=data[idx], title=lang==='zh'?a.cn:lang==='ja'?a.ja:a.en;
    return `<div class="slide"><img class="slide-bg" src="${a.img}" alt="${title}">
      <div class="slide-content">
        <div class="slide-tag">${a.tag[lang]||a.tag.en}</div>
        <div class="slide-title">${title}</div>
        <div class="slide-desc">${a.synopsis[lang]||a.synopsis.en}</div>
        <div class="slide-btns">
          <button class="btn btn-primary" onclick="openModal('${curTab}',${idx})">${I18N[lang].detailBtn}</button>
          <a class="btn btn-outline" href="${a.mal}" target="_blank">${I18N[lang].malBtn}</a>
        </div>
      </div></div>`;
  }).join('');
  dt.innerHTML = heroIdx.map((_,i)=>`<div class="dot${i===0?' active':''}" onclick="goTo(${i})"></div>`).join('');
  setTimeout(()=>{ sl.style.transition=''; startTimer(); }, 50);
}

function rebuildGrid() {
  const data = curTab==='cn' ? CN_ANIME : JP_ANIME;
  document.getElementById('grid').innerHTML = data.map((a,idx) => {
    const title = lang==='zh'?a.cn:lang==='ja'?a.ja:a.en;
    return `<div class="anime-card" onclick="openModal('${curTab}',${idx})">
      <img src="${a.img}" alt="${title}" loading="lazy" referrerpolicy="no-referrer">
      <div class="img-credit">© MAL</div>
      <div class="anime-card-info"><h3>${title}</h3><div class="score">★ ${a.score}</div><div class="year">${a.year}</div></div>
    </div>`;
  }).join('');
}

function switchTab(tab, el) {
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  rebuildHero(); rebuildGrid();
}

function goTo(n) {
  const len = document.getElementById('slides').children.length;
  cur = (n + len) % len;
  document.getElementById('slides').style.transform = `translateX(-${cur*100}%)`;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===cur));
}
function move(d){clearInterval(timer);goTo(cur+d);startTimer();}
function startTimer(){timer=setInterval(()=>goTo(cur+1),5000);}

function openModal(tab, idx) {
  const a=(tab==='cn'?CN_ANIME:JP_ANIME)[idx];
  const title=lang==='zh'?a.cn:lang==='ja'?a.ja:a.en;
  const alts=[a.cn,a.ja,a.en].filter((v,i,arr)=>arr.indexOf(v)===i&&v!==title).join(' / ');
  document.getElementById('modalBg').src=a.img;
  document.getElementById('modalPoster').src=a.img;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalSubtitle').textContent=alts;
  document.getElementById('modalMeta').innerHTML=`<span>${a.year}</span><span>★ ${a.score}</span>`;
  document.getElementById('modalScore').textContent=`${I18N[lang].scoreLabel}: ${a.score} / 10`;
  document.getElementById('modalSynopsis').textContent=a.synopsis[lang]||a.synopsis.en;
  const wm=[['tencent','link-tencent','🐧 腾讯视频'],['wetv','link-wetv','🌐 WeTV'],['bilibili','link-bili','📺 哔哩哔哩'],['bilitv','link-bilitv','📺 Bilibili.tv'],['iqiyi','link-iqiyi','🎬 爱奇艺'],['crunchyroll','link-crunchyroll','🍊 Crunchyroll'],['funimation','link-funi','🎌 Funimation'],['netflix','link-netflix','N Netflix'],['youtube','link-youtube','▶ YouTube']];
  document.getElementById('modalLinks').innerHTML=wm.filter(([k])=>a.watch[k]).map(([k,c,l])=>`<a class="modal-link ${c}" href="${a.watch[k]}" target="_blank">${l}</a>`).join('');
  document.getElementById('modalOfficial').innerHTML=`<a class="modal-link link-mal" href="${a.mal}" target="_blank">MyAnimeList</a>`;
  document.getElementById('modalCredit').textContent=I18N[lang].creditLabel;
  // PV
  const trailerEl = document.getElementById('modalTrailer');
  trailerEl.innerHTML = a.trailer
    ? `<div class="modal-section-title">PV / TRAILER</div><iframe src="https://www.youtube-nocookie.com/embed/${a.trailer}?rel=0" allowfullscreen loading="lazy"></iframe>`
    : '';
  // 高解像度画像
  document.getElementById('modalFullimg').innerHTML =
    `<div class="modal-section-title">KEY VISUAL</div><img src="${a.img}" alt="" loading="lazy">`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e) {
  if(e&&e.target!==document.getElementById('modalOverlay')&&!e.target.classList.contains('modal-close'))return;
  document.getElementById('modalTrailer').innerHTML='';
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('modalTrailer').innerHTML='';document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}});

document.addEventListener('scroll', () => {
  document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 40);
});
setLang('zh');
</script>
</body>
</html>
